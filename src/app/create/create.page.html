<ion-header>
  <ion-toolbar color="primary">

    <div slot="start" class="toolbar-text">
      <div class="main-title">Repostería</div>
      <div class="sub-title">
        <span *ngIf="role">{{ roleLabel }}</span>
        <span *ngIf="!role">Aplicación de repostería</span>
      </div>
    </div>

    <ion-buttons slot="end">
      <ion-button (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
        Salir
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>
<ion-content>

  <div class="form-container">

    <form [formGroup]="infoForm" (ngSubmit)="saveInfo()">

      <ion-item class="custom-item">
        <ion-label position="floating">Título</ion-label>
        <ion-input formControlName="info_title"></ion-input>
      </ion-item>

      <ion-item class="custom-item">
        <ion-label position="floating">Descripción</ion-label>
        <ion-textarea 
          rows="4"
          formControlName="info_description">
        </ion-textarea>
      </ion-item>

      <ion-button 
        expand="block" 
        color="success"
        class="save-btn"
        type="submit" 
        [disabled]="infoForm.invalid">
        Guardar
      </ion-button>

      <ion-button fill="clear" color="medium" (click)="goToDetail()">
        Omitir
      </ion-button>

    </form>

  </div>

</ion-content>
