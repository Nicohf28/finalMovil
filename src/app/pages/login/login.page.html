<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Repostería · Iniciar sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input
      label="Email"
      labelPlacement="floating"
      [(ngModel)]="email">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      label="Contraseña"
      type="password"
      labelPlacement="floating"
      [(ngModel)]="password">
    </ion-input>
  </ion-item>

  <ion-button expand="block" (click)="login()">
    Ingresar
  </ion-button>

  <ion-button fill="clear" routerLink="/register">
    Crear cuenta
  </ion-button>

  <ion-button fill="clear" size="small" (click)="resetPassword()">
    ¿Olvidaste tu contraseña?
  </ion-button>

</ion-content>
