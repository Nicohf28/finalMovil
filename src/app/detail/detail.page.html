<ion-header>
  <ion-toolbar color="primary">
    <ion-title class="toolbar-title">
      <div class="title-wrapper">
        <div class="main-title">Repostería</div>
        <div class="sub-title">Pedidos y productos</div>
      </div>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="container">

    <ion-button 
      expand="block" 
      color="success" 
      class="create-btn"
      (click)="createNew()">
      + Nuevo pedido
    </ion-button>

    <ion-list lines="none">

      <ion-card 
        *ngFor="let info of infos; let i = index" 
        class="info-card"
        [ngClass]="i % 2 === 0 ? 'purple-card' : 'green-card'">

        <ion-card-header>
          <ion-card-title>
            {{ info.info_title }}
          </ion-card-title>
        </ion-card-header>

        <ion-card-content>
          {{ info.info_description }}
        </ion-card-content>

        <div class="button-group">
          <ion-button 
            size="small"
            fill="outline"
            [ngClass]="i % 2 === 0 ? 'btn-purple' : 'btn-green'"
            (click)="editInfo(info.key)">
            Editar
          </ion-button>

          <ion-button 
            size="small"
            fill="outline"
            class="btn-red"
            (click)="confirmDelete(info.key)">
            Eliminar
          </ion-button>
        </div>

      </ion-card>

    </ion-list>

  </div>

<ion-button fill="clear" color="medium" (click)="endSession()">
        Cerrar Sesión
</ion-button>

</ion-content>
